name: Build Geode Mod (Apenas Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest

    steps:
    - name: Checkout do Repositorio
      uses: actions/checkout@v4

    # 🟢 A ACTION CORRETA: Instala a CLI oficial do Geode direto da raiz deles
    - name: Configurar Geode CLI
      uses: geode-sdk/setup-cli@v2

    # 💡 Instala os binários pré-compilados do SDK para ir voando
    - name: Instalar Binarios do SDK
      run: geode sdk install-binaries
      shell: powershell

    # Configura o perfil dummy para a máquina virtual buildar sem precisar do Geometry Dash instalado
    - name: Configurar Perfil do Geode
      run: geode profile add --name CI dummy_path
      shell: powershell

    # Compila o seu Mod de Pathfinder (.geode) forçando o ambiente de Windows
    - name: Compilar o Mod (.geode)
      run: geode mod build --platform win
      shell: powershell

    # Salva o arquivo final para você baixar e colocar na pasta mods do GD
    - name: Upload do Arquivo .geode Compilado
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Build
        path: "build/*.geode"