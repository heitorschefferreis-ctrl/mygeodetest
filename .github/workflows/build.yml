name: Build Geode Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
        - name: Android32
          os: ubuntu-latest
          target: Android32
        - name: Android64
          os: ubuntu-latest
          target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
    - name: Checkout do Repositorio
      uses: actions/checkout@v4

    # 🟢 NOVO: Instala e configura a CLI do Geode na maquina virtual antes de rodar o CMake
    - name: Setup do Geode CLI
      uses: geode-sdk/setup-geode@main

    - name: Rodar o Compilador do Geode SDK
      uses: geode-sdk/build-geode-mod@main
      with:
        bindings: geode-sdk/bindings
        bindings-ref: main
        target: ${{ matrix.config.target }}

    - name: Upload do Arquivo .geode Compilado
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.config.name }}-build
        path: build/*.geode