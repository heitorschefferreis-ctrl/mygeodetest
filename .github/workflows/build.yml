name: Build Geode Mod (Apenas Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest

    steps:
    - name: Checkout do Repositorio
      uses: actions/checkout@v4

    # 1. Instala o Geode CLI direto pelo terminal usando o script oficial deles
    - name: Baixar e Instalar Geode CLI Nativamente
      run: |
        # Executa o script oficial de instalacao do Geode via PowerShell
        Set-ExecutionPolicy Bypass -Scope Process -Force; iwr https://raw.githubusercontent.com/geode-sdk/cli/main/install.ps1 -UseBasicParsing | iex
        
        # Injeta a pasta do Geode no PATH do sistema para o GitHub reconhecer o comando 'geode'
        echo "$env:USERPROFILE\.geode\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: powershell

    # 2. Configura o perfil e baixa os binários pré-compilados do SDK
    - name: Inicializar SDK e Instalar Binarios
      run: |
        # Cria um perfil fake para a maquina virtual conseguir compilar sem precisar do jogo instalado
        geode profile add --name CI dummy_path
        geode profile select CI
        
        # A SUA IDÉIA MONSTRA: Baixa os binarios prontos do SDK para poupar tempo
        geode sdk install-binaries
      shell: powershell

    # 3. Compila o seu Mod forcando a plataforma do Windows moderna
    - name: Compilar o Mod (.geode)
      run: |
        geode mod build --platform win
      shell: powershell

    # 4. Salva o seu arquivo compilado para voce baixar na aba Actions
    - name: Upload do Arquivo .geode Compilado
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Build
        path: "build/*.geode"