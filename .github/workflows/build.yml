name: Build Geode Mod

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-2022
          - name: macOS
            os: macos-14
          - name: Android32
            os: ubuntu-latest
            target: Android32
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: Build ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          combine: true

  package:
    name: Package Builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - name: Merge Platform Builds
        uses: geode-sdk/build-geode-mod/combine@main
        id: merge

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geode-build-output
          path: ${{ steps.merge.outputs.build-output }}
