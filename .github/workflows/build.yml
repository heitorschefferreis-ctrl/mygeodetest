name: Build Geode Mod (Apenas Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest

    steps:
    - name: Checkout do Repositorio
      uses: actions/checkout@v4

    # 🟢 BAIXA A CLI DIRETO DO RELEASE DO GITHUB (Sem usar Actions bugadas!)
    # Baixa a versao v3.1.2 (ou a mais recente estavel da CLI deles)
    # Se der erro de TLS, o Invoke-WebRequest resolve nativamente no Windows Server
    name: Baixar e Instalar Geode CLI Manualmente
    run: |
      # Cria a pasta para a CLI
      New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.geode\bin"
      
      # Baixa o zip oficial da CLI do Geode para Windows
      Invoke-WebRequest -Uri "https://github.com/geode-sdk/cli/releases/latest/download/geode-cli-win.zip" -OutFile "geode-cli.zip"
      
      # Extrai o geode.exe direto na pasta de binarios
      Expand-Archive -Path "geode-cli.zip" -DestinationPath "$env:USERPROFILE\.geode\bin" -Force
      
      # Adiciona a pasta ao PATH do GitHub Actions para os próximos passos reconhecerem o comando 'geode'
      echo "$env:USERPROFILE\.geode\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    shell: powershell

    # 💡 A SUA IDÉIA: Instala os binários pré-compilados do SDK
    - name: Instalar Binarios do SDK
      run: |
        # Cria um perfil dummy pro compilador nao caçar o Geometry Dash na maquina virtual
        geode profile add --name CI dummy_path
        geode profile select CI
        
        # Baixa a estrutura base
        geode sdk install-binaries
      shell: powershell

    # Compila o seu Mod de Pathfinder (.geode) forçando o ambiente de Windows
    - name: Compilar o Mod (.geode)
      run: geode mod build --platform win
      shell: powershell

    # Salva o arquivo final para você baixar e colocar na pasta mods do GD
    - name: Upload do Arquivo .geode Compilado
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Build
        path: "build/*.geode"